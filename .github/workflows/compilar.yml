name: Gerar Executável (.EXE)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Baixar o Código
      uses: actions/checkout@v4

    - name: Configurar o MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Compilar e definir o nome do EXE
      run: msbuild divinity-menu.vcxproj /p:Configuration=Release /p:Platform=x64 /p:TargetName=O_Nome_Que_Você_Quiser

    - name: Salvar o arquivo .EXE
      uses: actions/upload-artifact@v4
      with:
        name: Executavel-Pronto
        path: |
          **/Release/*.exe
